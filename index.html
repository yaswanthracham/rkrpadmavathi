<!DOCTYPE html>
<html>
<head>

<title>Payment Admin</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:Arial;
background:#eef2f7;
margin:0;
}

.container{
width:420px;
margin:auto;
margin-top:40px;
background:white;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
overflow:hidden;
}

.header{
background:#4e73df;
color:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.form{
padding:25px;
}

label{
font-weight:600;
display:block;
}

.required::after{
content:" *";
color:red;
}

input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:6px;
}

.timer{
display:flex;
gap:10px;
align-items:center;
}

.timer input{
width:80px;
}

.apps{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:20px;
}

.app{
border:1px solid #ddd;
border-radius:8px;
padding:14px;
text-align:center;
background:#fafafa;
font-weight:600;
}

button{
width:100%;
padding:14px;
border:none;
background:#4e73df;
color:white;
font-size:15px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#375ac9;
}

.paymentbtn{
display:flex;
gap:10px;
}

.smallbtn{
width:70px;
}

#qr{
text-align:center;
margin-bottom:15px;
}

.login{
width:320px;
margin:auto;
margin-top:120px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

.topbar{
display:flex;
justify-content:space-between;
padding:10px;
}

.smalltop{
padding:6px 10px;
background:#4e73df;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

footer{
text-align:center;
padding:15px;
font-size:14px;
color:#555;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage" class="login">

<h2>Admin Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Submit</button>

</div>

<!-- ADMIN PANEL -->

<div id="adminPage" style="display:none">

<div class="container">

<div class="topbar">

<button class="smalltop" onclick="showRecords()">Records</button>
<button class="smalltop" onclick="logout()">Logout</button>

</div>

<div class="header">Payment Admin</div>

<div class="form">

<div id="qr"></div>

<label class="required">Amount</label>
<input id="amount" placeholder="Enter Amount">

<label class="required">UPI ID</label>
<input id="upi" placeholder="Enter UPI ID (example@upi)">

<label>Timer (MM:SS)</label>

<div class="timer">
<input id="min" value="5">
<span>:</span>
<input id="sec" value="0">
</div>

<h4>Payment Apps</h4>

<div class="apps">

<div class="app">Google Pay</div>
<div class="app">Paytm</div>
<div class="app">PhonePe</div>
<div class="app">UPI</div>

</div>

<div id="linkBox"></div>

<div class="paymentbtn">

<button onclick="generateLink()">Generate Link</button>
<button class="smallbtn" onclick="generateQR()">QR</button>

</div>

<div id="records"></div>

</div>

</div>

<footer>© 2026 Yash Reddy</footer>

</div>

<script>

let records=[]

function login(){

let u=document.getElementById("username").value
let p=document.getElementById("password").value

if(!localStorage.adminPass){

localStorage.adminUser=u
localStorage.adminPass=p

}

if(u===localStorage.adminUser && p===localStorage.adminPass){

document.getElementById("loginPage").style.display="none"
document.getElementById("adminPage").style.display="block"

}else{

alert("Invalid login")

}

}

function logout(){
location.reload()
}

let paymentLink=""

function generateLink(){

let amount=document.getElementById("amount").value
let upi=document.getElementById("upi").value

if(amount=="" || upi==""){

alert("Amount and UPI ID required")
return

}

paymentLink=location.href+"?amount="+amount+"&upi="+upi

document.getElementById("linkBox").innerHTML="<p>"+paymentLink+"</p>"

}

function generateQR(){

if(paymentLink==""){
alert("Generate link first")
return
}

document.getElementById("qr").innerHTML=""

new QRCode(document.getElementById("qr"),{
text:paymentLink,
width:200,
height:200
})

}

function showRecords(){

let html="<table><tr><th>Amount</th><th>UPI</th><th>UTR</th></tr>"

records.forEach(r=>{
html+=`<tr><td>${r.amount}</td><td>${r.upi}</td><td>${r.utr}</td></tr>`
})

html+="</table>"

document.getElementById("records").innerHTML=html

}

/* CUSTOMER PAGE */

let params=new URLSearchParams(window.location.search)

if(params.get("amount")){

let amount=params.get("amount")
let upi=params.get("upi")

document.body.innerHTML=`

<div class="container">

<div class="header">Complete Payment</div>

<div class="form">

<h3>Amount ₹${amount}</h3>

<p>Pay using UPI then enter UTR.</p>

<input id="utr" placeholder="Enter UTR *">

<button onclick="submitUTR()">Submit Payment</button>

</div>

</div>

<footer>© 2026 Yash Reddy</footer>

`

window.submitUTR=function(){

let utr=document.getElementById("utr").value

if(utr==""){
alert("UTR required")
return
}

records.push({amount:amount,upi:upi,utr:utr})

alert("Payment submitted")

}

}

</script>

</body>
</html>
